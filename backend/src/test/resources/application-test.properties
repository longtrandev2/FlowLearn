# H2 In-Memory Database Configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate / JPA settings for matching dialects
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Mock JWT values for tests so it doesn't fail parsing properties
application.security.jwt.secret-key=this_is_a_very_long_dummy_secret_key_for_testing_purposes_only_1234567890
application.security.jwt.expiration=86400000

# Do not load env.local in testing environment
spring.config.import=
