spring.application.name=backend

    server.port=8080
    server.servlet.context-path=/app

    spring.datasource.url=jdbc:mysql://localhost:3306/flowlearn_db?serverTimezone=UTC&createDatabaseIfNotExist=true
    spring.datasource.username=${DB_USERNAME}
    spring.datasource.password=${DB_PASSWORD}
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

    spring.jpa.show-sql=true
    spring.jpa.hibernate.ddl-auto=update
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

    spring.jpa.open-in-view=false

    logging.level.root=INFO
    logging.level.org.example.backend=DEBUG

    # Cloudflare R2 Configuration
    cloudflare.r2.access-key=${R2_ACCESS_KEY:dummy_access_key}
    cloudflare.r2.secret-key=${R2_SECRET_KEY:dummy_secret_key}
    cloudflare.r2.endpoint-url=https://${R2_ACCOUNT_ID:dummy_account_id}.r2.cloudflarestorage.com
    cloudflare.r2.bucket=${R2_BUCKET:flowlearn-documents}

# Gemini AI
gemini.api.key=${GEMINI_API_KEY}
