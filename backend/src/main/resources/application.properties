spring.application.name=backend

    server.port=8080
    server.servlet.context-path=/app

    spring.datasource.url=jdbc:mysql://localhost:3306/flowlearn_db?serverTimezone=UTC&createDatabaseIfNotExist=true
    spring.datasource.username=${DB_USERNAME}
    spring.datasource.password=${DB_PASSWORD}
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

    spring.jpa.show-sql=true
    spring.jpa.hibernate.ddl-auto=update
application.security.jwt.secret-key=${JWT_SECRET_KEY}
application.security.jwt.expiration=${JWT_EXPIRATION:86400000}

    spring.jpa.open-in-view=false

    logging.level.root=INFO
    logging.level.org.example.backend=DEBUG
