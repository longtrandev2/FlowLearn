spring.application.name=backend

    server.port=8080
    server.servlet.context-path=/app

    spring.datasource.url=jdbc:mysql://localhost:3306/flowlearn_db?serverTimezone=UTC&createDatabaseIfNotExist=true
    spring.datasource.username=${DB_USERNAME}
    spring.datasource.password=${DB_PASSWORD}
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

    spring.jpa.show-sql=true
    spring.jpa.hibernate.ddl-auto=update
    application.security.jwt.secret-key=${JWT_SECRET_KEY}
    application.security.jwt.expiration=${JWT_EXPIRATION}

    spring.jpa.open-in-view=false

    logging.level.root=INFO
    logging.level.org.example.backend=DEBUG

    # Cloudinary Configuration
    cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:dummy_cloud_name}
    cloudinary.api-key=${CLOUDINARY_API_KEY:dummy_api_key}
    cloudinary.api-secret=${CLOUDINARY_API_SECRET:dummy_api_secret}

# Gemini AI
gemini.api.key=${GEMINI_API_KEY}
